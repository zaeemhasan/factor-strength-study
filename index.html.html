
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-mono, monospace); background: transparent; }
  .terminal { background: #0a0c0f; border-radius: var(--border-radius-lg); border: 0.5px solid #1e2530; overflow: hidden; padding: 0; }
  .titlebar { background: #111318; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #1e2530; }
  .dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .tname { font-size: 11px; color: #4a5568; letter-spacing: 0.08em; }
  .ticker-bar { display: flex; gap: 0; overflow-x: auto; border-bottom: 0.5px solid #1e2530; scrollbar-width: none; }
  .ticker-bar::-webkit-scrollbar { display: none; }
  .ticker-btn { padding: 8px 14px; font-size: 11px; font-family: var(--font-mono, monospace); color: #4a5568; background: transparent; border: none; border-right: 0.5px solid #1e2530; cursor: pointer; white-space: nowrap; transition: color 0.15s, background 0.15s; }
  .ticker-btn:hover { color: #7cd4a8; background: #0f1a14; }
  .ticker-btn.active { color: #7cd4a8; background: #0f1a14; border-bottom: 2px solid #7cd4a8; }
  .scores-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1px; background: #1e2530; border-bottom: 0.5px solid #1e2530; }
  .score-card { background: #0a0c0f; padding: 14px 16px; }
  .sc-label { font-size: 9px; letter-spacing: 0.1em; color: #3a4a5c; text-transform: uppercase; margin-bottom: 6px; }
  .sc-val { font-size: 22px; font-weight: 500; margin-bottom: 2px; }
  .sc-sub { font-size: 10px; color: #3a4a5c; }
  .body { padding: 12px 16px; }
  .section-head { font-size: 9px; letter-spacing: 0.12em; color: #3a4a5c; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .section-head::after { content: ''; flex: 1; height: 0.5px; background: #1e2530; }
  .market-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 16px; }
  .market-table th { text-align: left; color: #3a4a5c; font-weight: 400; padding: 4px 8px 6px 0; border-bottom: 0.5px solid #1e2530; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .market-table td { padding: 6px 8px 6px 0; border-bottom: 0.5px solid #0f131a; color: #8899aa; vertical-align: middle; }
  .market-table tr:hover td { color: #aabbc8; }
  .bar-bg { background: #0f1a14; border-radius: 2px; height: 4px; width: 80px; }
  .bar-fill { height: 4px; border-radius: 2px; transition: width 0.4s ease; }
  .signal { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
  .sig-long { background: #0f2a1a; color: #7cd4a8; }
  .sig-short { background: #2a0f14; color: #d47c8c; }
  .sig-neut { background: #1a1e2a; color: #4a6080; }
  .composite-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid #0f131a; }
  .comp-name { font-size: 11px; color: #7a8e9c; flex: 1; }
  .comp-bar-bg { flex: 2; background: #0f131a; border-radius: 2px; height: 5px; position: relative; }
  .comp-bar-fill { height: 5px; border-radius: 2px; position: absolute; left: 50%; transform-origin: left; }
  .comp-bar-fill.neg { transform-origin: right; left: auto; right: 50%; }
  .comp-score { font-size: 11px; min-width: 38px; text-align: right; }
  .log-area { font-size: 10px; color: #3a4a5c; line-height: 1.8; margin-top: 12px; }
  .log-line { display: flex; gap: 10px; }
  .log-ts { color: #1e3040; }
  .log-msg { color: #3a5060; }
  .log-msg.hi { color: #7cd4a8; }
  .refresh-btn { font-family: var(--font-mono, monospace); font-size: 10px; letter-spacing: 0.08em; background: transparent; border: 0.5px solid #1e2530; color: #4a6080; padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
  .refresh-btn:hover { color: #7cd4a8; border-color: #7cd4a8; }
  .blink { animation: blink 1.2s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: #7cd4a8; display: inline-block; margin-right: 5px; }
</style>

<div class="terminal">
  <div class="titlebar">
    <div class="dots">
      <div class="dot" style="background:#e05252;"></div>
      <div class="dot" style="background:#e0a052;"></div>
      <div class="dot" style="background:#52c07a;"></div>
    </div>
    <span class="tname"><span class="status-dot blink"></span>QUANT SIGNAL TERMINAL · PREDICTION MARKETS · LIVE SIM</span>
    <button class="refresh-btn" onclick="refreshAll()">↻ REFRESH</button>
  </div>

  <div class="ticker-bar" id="tickerBar"></div>

  <div class="scores-grid" id="scoresGrid"></div>

  <div class="body">
    <div class="section-head">market scanner — all contracts</div>
    <table class="market-table" id="mktTable">
      <thead>
        <tr>
          <th style="width:24%">contract</th>
          <th style="width:8%">prob</th>
          <th style="width:12%">divergence</th>
          <th style="width:12%">disposition</th>
          <th style="width:12%">velocity</th>
          <th style="width:12%">pair corr</th>
          <th style="width:10%">composite</th>
          <th style="width:10%">signal</th>
        </tr>
      </thead>
      <tbody id="mktBody"></tbody>
    </table>

    <div class="section-head">composite score decomposition</div>
    <div id="compDecomp"></div>

    <div class="log-area" id="logArea"></div>
  </div>
</div>

<script>
const MARKETS = [
  { id: 'FED_CUT', name: 'Fed rate cut Jun 2025', category: 'macro', base: 0.41 },
  { id: 'BTC_100K', name: 'BTC hits $100K before EOY', category: 'crypto', base: 0.38 },
  { id: 'REC_2025', name: 'US recession in 2025', category: 'macro', base: 0.28 },
  { id: 'TRUMP_DEAL', name: 'US-China trade deal 2025', category: 'geo', base: 0.34 },
  { id: 'OIL_80', name: 'Brent crude above $80', category: 'commodity', base: 0.52 },
  { id: 'SPX_5K', name: 'S&P 500 ends year >5000', category: 'equity', base: 0.61 },
  { id: 'EUR_PAR', name: 'EUR/USD at parity', category: 'fx', base: 0.17 },
  { id: 'NVIDIA_1T', name: 'Nvidia sustains $1T+ cap', category: 'equity', base: 0.69 },
  { id: 'GOLD_3K', name: 'Gold above $3,000 EOY', category: 'commodity', base: 0.44 },
  { id: 'JPY_150', name: 'USD/JPY above 150', category: 'fx', base: 0.55 },
];

const PAIRS = [
  ['FED_CUT','REC_2025'],['FED_CUT','BTC_100K'],['OIL_80','REC_2025'],
  ['SPX_5K','NVIDIA_1T'],['EUR_PAR','JPY_150'],['GOLD_3K','REC_2025'],
  ['TRUMP_DEAL','SPX_5K'],['BTC_100K','NVIDIA_1T'],
];

let state = {};
let activeMarket = 'FED_CUT';
let logs = [];

function rng(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return ((s >>> 0) / 0xffffffff);
  };
}

function computeFactors(mid, seed) {
  const r = rng(seed + Date.now() % 10000);
  const prob = Math.max(0.03, Math.min(0.97, mid + (r() - 0.5) * 0.06));
  const polyProb = Math.max(0.03, Math.min(0.97, prob + (r() - 0.5) * 0.12));
  const divergence = (polyProb - prob);
  const dispositionRaw = (r() - 0.42) * 2;
  const velocityRaw = r() * 1.8 + 0.2;
  const pairCorr = (r() - 0.5) * 2;
  const composite = (
    divergence * 2.2 +
    dispositionRaw * 0.8 +
    (velocityRaw - 1.0) * 0.6 +
    pairCorr * 0.7
  );
  return { prob, polyProb, divergence, dispositionRaw, velocityRaw, pairCorr, composite };
}

function buildState() {
  const seeds = { FED_CUT:1, BTC_100K:2, REC_2025:3, TRUMP_DEAL:4, OIL_80:5, SPX_5K:6, EUR_PAR:7, NVIDIA_1T:8, GOLD_3K:9, JPY_150:10 };
  MARKETS.forEach(m => {
    state[m.id] = { ...m, ...computeFactors(m.base, seeds[m.id] * 999 + Math.floor(Date.now()/5000)) };
  });
}

function colorScore(v) {
  if (v > 0.3) return '#7cd4a8';
  if (v > 0.05) return '#a8c47c';
  if (v < -0.3) return '#d47c8c';
  if (v < -0.05) return '#c4a07c';
  return '#4a6080';
}

function fmtPct(v, decimals=1) { return (v*100).toFixed(decimals)+'%'; }
function fmtSigned(v, decimals=2) { return (v>=0?'+':'')+v.toFixed(decimals); }

function signalLabel(composite) {
  if (composite > 0.35) return ['LONG', 'sig-long'];
  if (composite < -0.35) return ['SHORT', 'sig-short'];
  return ['NEUT', 'sig-neut'];
}

function renderTickers() {
  const bar = document.getElementById('tickerBar');
  bar.innerHTML = MARKETS.map(m => 
    `<button class="ticker-btn${m.id===activeMarket?' active':''}" onclick="setActive('${m.id}')">${m.id.replace('_',' ')}</button>`
  ).join('');
}

function renderScores() {
  const s = state[activeMarket];
  const factors = [
    { label: 'Cross-market divergence', val: fmtSigned(s.divergence*100,1)+'%', sub: `Kalshi ${fmtPct(s.prob)} · Poly ${fmtPct(s.polyProb)}`, color: colorScore(s.divergence*2) },
    { label: 'Disposition coefficient', val: fmtSigned(s.dispositionRaw, 3), sub: s.dispositionRaw>0 ? 'disposition effect ↑' : 'counter-disposition ↓', color: colorScore(s.dispositionRaw) },
    { label: 'Capital velocity', val: s.velocityRaw.toFixed(2)+'x', sub: s.velocityRaw>1.0 ? 'above baseline' : 'below baseline', color: colorScore(s.velocityRaw-1.0) },
    { label: 'Pair network corr', val: fmtSigned(s.pairCorr, 3), sub: pairLabel(activeMarket), color: colorScore(s.pairCorr) },
  ];
  document.getElementById('scoresGrid').innerHTML = factors.map(f =>
    `<div class="score-card">
      <div class="sc-label">${f.label}</div>
      <div class="sc-val" style="color:${f.color}">${f.val}</div>
      <div class="sc-sub">${f.sub}</div>
    </div>`
  ).join('');
}

function pairLabel(id) {
  const p = PAIRS.find(pair => pair[0]===id || pair[1]===id);
  if (!p) return 'no active pair';
  const other = p[0]===id ? p[1] : p[0];
  return `paired w/ ${other.replace('_',' ')}`;
}

function renderTable() {
  const rows = MARKETS.map(m => {
    const s = state[m.id];
    const [sigText, sigClass] = signalLabel(s.composite);
    const compColor = colorScore(s.composite);
    const divFill = Math.min(Math.abs(s.divergence)*5*100, 100);
    const divColor = s.divergence>0 ? '#7cd4a8' : '#d47c8c';
    const dispFill = Math.min(Math.abs(s.dispositionRaw)*50, 100);
    const dispColor = s.dispositionRaw>0 ? '#a8c47c' : '#c4907c';
    const velFill = Math.min(s.velocityRaw/2*100, 100);
    const corrFill = Math.min(Math.abs(s.pairCorr)*100, 100);
    const corrColor = s.pairCorr>0 ? '#7cb4d4' : '#d4b47c';
    return `<tr>
      <td style="color:${m.id===activeMarket?'#aaccbb':'#6a7e8c'};cursor:pointer" onclick="setActive('${m.id}')">${m.name}</td>
      <td style="color:#5a7080">${fmtPct(s.prob)}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${divFill}%;background:${divColor}"></div></div></td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${dispFill}%;background:${dispColor}"></div></div></td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${velFill}%;background:#7cb4d4"></div></div></td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${corrFill}%;background:${corrColor}"></div></div></td>
      <td style="color:${compColor};font-weight:500">${fmtSigned(s.composite,2)}</td>
      <td><span class="signal ${sigClass}">${sigText}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('mktBody').innerHTML = rows;
}

function renderDecomp() {
  const sorted = MARKETS.slice().sort((a,b) => Math.abs(state[b.id].composite)-Math.abs(state[a.id].composite));
  document.getElementById('compDecomp').innerHTML = sorted.map(m => {
    const s = state[m.id];
    const v = s.composite;
    const color = colorScore(v);
    const w = Math.min(Math.abs(v)*60, 48);
    const isNeg = v < 0;
    return `<div class="composite-row">
      <span class="comp-name">${m.name}</span>
      <div class="comp-bar-bg">
        <div class="comp-bar-fill${isNeg?' neg':''}" style="width:${w}%;background:${color}"></div>
      </div>
      <span class="comp-score" style="color:${color}">${fmtSigned(v,3)}</span>
    </div>`;
  }).join('');
}

function addLog(msg, hi=false) {
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
  logs.unshift({ts, msg, hi});
  if (logs.length > 6) logs.pop();
  document.getElementById('logArea').innerHTML = logs.map(l=>
    `<div class="log-line"><span class="log-ts">${l.ts}</span><span class="log-msg${l.hi?' hi':''}">${l.msg}</span></div>`
  ).join('');
}

function setActive(id) {
  activeMarket = id;
  renderTickers();
  renderScores();
  const s = state[id];
  addLog(`→ inspecting ${id} · composite ${fmtSigned(s.composite,3)}`, true);
}

function refreshAll() {
  buildState();
  renderTickers();
  renderScores();
  renderTable();
  renderDecomp();
  const top = MARKETS.slice().sort((a,b)=>Math.abs(state[b.id].composite)-Math.abs(state[a.id].composite))[0];
  const s = state[top.id];
  const [sig] = signalLabel(s.composite);
  addLog(`scan complete · strongest signal: ${top.id} [${sig}] ${fmtSigned(s.composite,3)}`, true);
  addLog(`pair network updated · ${PAIRS.length} active edges`);
  addLog(`velocity threshold breach: ${MARKETS.filter(m=>state[m.id].velocityRaw>1.4).map(m=>m.id).join(', ')||'none'}`);
}

buildState();
renderTickers();
renderScores();
renderTable();
renderDecomp();
addLog(`terminal init · ${MARKETS.length} contracts loaded`, true);
addLog(`scoring: divergence · disposition · velocity · pair corr`);
</script>
